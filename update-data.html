<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Update Offline Data</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #0f172a;
            color: #f8fafc;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
        }

        .card {
            background: #1e293b;
            padding: 40px;
            border-radius: 12px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
            max-width: 500px;
            text-align: center;
        }

        h1 {
            margin-top: 0;
            color: #3b82f6;
        }

        p {
            color: #94a3b8;
            line-height: 1.6;
            margin-bottom: 30px;
        }

        button {
            background: linear-gradient(135deg, #3b82f6, #8b5cf6);
            color: white;
            border: none;
            padding: 14px 28px;
            border-radius: 30px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
        }

        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(59, 130, 246, 0.4);
        }

        button:active {
            transform: translateY(0);
            box-shadow: none;
        }

        #status {
            margin-top: 20px;
            font-weight: bold;
            display: none;
            padding: 15px;
            border-radius: 8px;
        }

        .success {
            background: rgba(34, 197, 94, 0.1);
            color: #4ade80;
            border: 1px solid rgba(34, 197, 94, 0.2);
        }

        .error {
            background: rgba(239, 68, 68, 0.1);
            color: #f87171;
            border: 1px solid rgba(239, 68, 68, 0.2);
        }

        #codeOutput {
            margin-top: 20px;
            text-align: left;
            background: #0f172a;
            padding: 15px;
            border-radius: 8px;
            border: 1px solid #334155;
            max-height: 200px;
            overflow-y: auto;
            font-family: monospace;
            font-size: 0.85rem;
            color: #a5b4fc;
            display: none;
        }
    </style>
</head>
<body>

    <div class="card">
        <h1>Sync Offline Data</h1>
        <p>This will download the latest content directly from Google Sheets and generate the code for your <code>data.js</code> file.</p>
        
        <button id="syncBtn" onclick="generateDataFile()">📥 Download & Generate Code</button>

        <div id="status"></div>
        <pre id="codeOutput"></pre>
    </div>

    <!-- Ensure config is loaded first -->
    <script src="js/sheets-config.js"></script>

    <script>
        async function generateDataFile() {
            const btn = document.getElementById('syncBtn');
            const statusEl = document.getElementById('status');
            const codeOutput = document.getElementById('codeOutput');
            
            btn.innerText = "⏳ Fetching from Google Sheets...";
            btn.disabled = true;
            statusEl.style.display = 'none';
            codeOutput.style.display = 'none';

            try {
                if (!SHEETS_CONFIG || !SHEETS_CONFIG.scriptUrl || SHEETS_CONFIG.scriptUrl === "YOUR-SCRIPT-URL") {
                    throw new Error("Invalid scriptUrl. Please check js/sheets-config.js.");
                }

                const scriptUrl = SHEETS_CONFIG.scriptUrl;
                const tabs = ['Events', 'Blog', 'Projects', 'Resources', 'Team'];
                const siteData = {};

                for (const tab of tabs) {
                    btn.innerText = `⏳ Fetching ${tab}...`;
                    const response = await fetch(`${scriptUrl}?sheet=${tab}`);
                    if (!response.ok) throw new Error(`Failed to fetch ${tab}`);
                    
                    const data = await response.json();
                    
                    // Normalize the data (exactly like sheets-sync.js does)
                    siteData[tab.toLowerCase()] = data.map(row => {
                        let out = {};
                        for (let key in row) {
                            out[key] = typeof row[key] === 'string' ? row[key].trim() : row[key];
                        }
                        if (tab === 'Projects' && typeof out.tags === 'string') {
                            out.tags = out.tags ? out.tags.split(',').map(t => t.trim()) : [];
                        }
                        if (tab === 'Team' && out.type) {
                            out.type = out.type.toLowerCase().trim();
                        }
                        return out;
                    }).filter(row => {
                        const titleKey = (tab === 'Team') ? 'name' : 'title';
                        return row[titleKey] && String(row[titleKey]).trim() !== '';
                    });
                }

                // Generate the file string
                const fileContent = `/* \n * ============================================================\n *  AUTO-GENERATED FALLBACK DATA\n *  Generated via update-data.html\n * ============================================================\n */\n\nconst siteData = ${JSON.stringify(siteData, null, 2)};\n\nif (typeof module !== 'undefined' && module.exports) {\n  module.exports = siteData;\n}\n`;

                codeOutput.textContent = fileContent;
                codeOutput.style.display = 'block';

                statusEl.className = 'success';
                statusEl.innerHTML = "✅ Success! Copy the code below and paste it into <code>js/data.js</code>, replacing everything inside.";
                statusEl.style.display = 'block';

            } catch (error) {
                statusEl.className = 'error';
                statusEl.innerHTML = `❌ Error: ${error.message}`;
                statusEl.style.display = 'block';
            } finally {
                btn.innerText = "📥 Download & Generate Code";
                btn.disabled = false;
            }
        }
    </script>
</body>
</html>
